{% extends "base.html" %}
{% block title %}Register — LearnMate{% endblock %}
{% block content %}
<div class="lm-auth-container">
  <div class="lm-auth-card">
    <div class="text-center mb-4">
      <div class="lm-logo-icon lm-logo-lg mx-auto mb-3"><i class="bi bi-mortarboard-fill"></i></div>
      <h2 class="fw-800">Create Your Account</h2>
      <p class="text-muted">Start your personalised learning journey today</p>
    </div>
    <form method="POST" action="{{ url_for('auth.register') }}" class="needs-validation" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-3">
        <label class="form-label fw-600">Full Name</label>
        <div class="input-group">
          <span class="input-group-text lm-input-icon"><i class="bi bi-person-badge-fill"></i></span>
          <input type="text" name="full_name" class="form-control lm-input" placeholder="Your full name" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-600">Username</label>
        <div class="input-group">
          <span class="input-group-text lm-input-icon"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="username" class="form-control lm-input" placeholder="Choose a username" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-600">Email</label>
        <div class="input-group">
          <span class="input-group-text lm-input-icon"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" name="email" class="form-control lm-input" placeholder="your@email.com" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600">Password</label>
        <div class="input-group">
          <span class="input-group-text lm-input-icon"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" id="regPassword" class="form-control lm-input" placeholder="Create a strong password" required minlength="6"/>
          <button type="button" class="btn lm-input-icon lm-toggle-pw" data-target="regPassword"><i class="bi bi-eye-fill"></i></button>
        </div>
      </div>
      <button type="submit" class="btn lm-btn-primary w-100 btn-lg">
        <i class="bi bi-rocket-takeoff me-2"></i>Create Account
      </button>
    </form>
    <hr class="my-4"/>
    <p class="text-center text-muted mb-0">
      Already have an account? <a href="{{ url_for('auth.login') }}" class="lm-link">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
