{% extends "base.html" %}
{% block title %}Login — LearnMate{% endblock %}
{% block content %}
<div class="lm-auth-container">
  <div class="lm-auth-card">
    <div class="text-center mb-4">
      <div class="lm-logo-icon lm-logo-lg mx-auto mb-3"><i class="bi bi-mortarboard-fill"></i></div>
      <h2 class="fw-800">Welcome Back</h2>
      <p class="text-muted">Sign in to continue your learning journey</p>
    </div>
    <form method="POST" action="{{ url_for('auth.login') }}" class="needs-validation" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-3">
        <label class="form-label fw-600">Username</label>
        <div class="input-group">
          <span class="input-group-text lm-input-icon"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="username" class="form-control lm-input" placeholder="Enter your username" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600">Password</label>
        <div class="input-group">
          <span class="input-group-text lm-input-icon"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" id="loginPassword" class="form-control lm-input" placeholder="Enter your password" required/>
          <button type="button" class="btn lm-input-icon lm-toggle-pw" data-target="loginPassword"><i class="bi bi-eye-fill"></i></button>
        </div>
      </div>
      <button type="submit" class="btn lm-btn-primary w-100 btn-lg">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
    <hr class="my-4"/>
    <p class="text-center text-muted mb-0">
      Don't have an account? <a href="{{ url_for('auth.register') }}" class="lm-link">Create one free</a>
    </p>
  </div>
</div>
{% endblock %}
